<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIO TOP UP</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .header { background: #0d1b2a; color: white; width: 100%; padding: 15px; font-size: 20px; font-weight: bold; }
        .main-card { background: white; width: 90%; max-width: 450px; margin: 20px; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .package-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .package-item { border: 2px solid #ddd; border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        
        /* Select হলে এই রঙ হবে */
        .selected { border-color: #5c7cfa !important; background: #edf2ff !important; box-shadow: 0 0 10px rgba(92,124,250,0.3); }
        
        .package-name { font-size: 14px; font-weight: bold; display: block; }
        .package-price { font-size: 16px; color: #f76707; font-weight: 800; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; background: #5c7cfa; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">AXIO TOP UP</div>
    <div class="main-card">
        <div class="package-grid">
            <div class="package-item" onclick="setPack(this, '25 Diamond', '17')"><span class="package-name">25 Diamond</span><span class="package-price">17 TK</span></div>
            <div class="package-item" onclick="setPack(this, '50 Diamond', '31')"><span class="package-name">50 Diamond</span><span class="package-price">31 TK</span></div>
            <div class="package-item" onclick="setPack(this, '100 Diamond', '67')"><span class="package-name">100 Diamond</span><span class="package-price">67 TK</span></div>
            <div class="package-item" onclick="setPack(this, 'Weekly', '145')"><span class="package-name">Weekly</span><span class="package-price">145 TK</span></div>
        </div>
        <form action="/order" method="POST">
            <input type="hidden" name="package" id="p_input" required>
            <input type="text" name="player_id" placeholder="Player UID" required>
            <select name="payment_method"><option value="bkash">bkash</option><option value="Nagad">Nagad</option></select>
            <input type="text" name="trx_id" placeholder="Transaction ID" required>
            <button type="submit" class="btn">Order Now</button>
        </form>
    </div>
    <script>
        function setPack(el, name, price) {
            var items = document.getElementsByClassName('package-item');
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove('selected');
            }
            el.classList.add('selected');
            document.getElementById('p_input').value = name + " - " + price + " TK";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIO TOP UP</title>
    <style>
        body { font-family: "Segoe UI", sans-serif; background: #f5f7fa; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: #0d1b2a; color: white; width: 100%; padding: 20px 0; text-align: left; }
        .header h1 { margin: 0; padding-left: 20px; font-size: 22px; }
        .main-card { background: white; width: 90%; max-width: 450px; margin-top: 25px; border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .title { color: #5c7cfa; font-size: 20px; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #edf2ff; padding-bottom: 10px; }
        .payment-info { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .payment-info p { margin: 5px 0; font-size: 14px; font-weight: bold; color: #364fc7; }
        .package-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .package-item { border: 1.5px solid #dee2e6; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; }
        .package-item.selected { border-color: #5c7cfa; background: #edf2ff; box-shadow: 0 0 0 2px rgba(92,124,250,0.2); }
        .package-name { display: block; font-size: 13px; font-weight: 600; color: #495057; }
        .package-price { display: block; font-size: 15px; font-weight: 800; color: #f76707; margin-top: 4px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #495057; }
        input, select { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #dee2e6; border-radius: 12px; font-size: 15px; box-sizing: border-box; }
        .btn-order { width: 100%; background: #748ffc; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>AXIO TOP UP</h1></div>
    <div class="main-card">
        <div class="title">Free Fire UID Topup</div>
        <div class="payment-info"><p>bkash / Nagad: 01931931670</p></div>
        <label>Select Package</label>
        <div class="package-grid">
            <div class="package-item" onclick="selectPack(this, 25 Diamond, 17)"><span class="package-name">25 Diamond</span><span class="package-price">17 TK</span></div>
            <div class="package-item" onclick="selectPack(this, 50 Diamond, 31)"><span class="package-name">50 Diamond</span><span class="package-price">31 TK</span></div>
            <div class="package-item" onclick="selectPack(this, 100 Diamond, 67)"><span class="package-name">100 Diamond</span><span class="package-price">67 TK</span></div>
            <div class="package-item" onclick="selectPack(this, 115 Diamond, 71)"><span class="package-name">115 Diamond</span><span class="package-price">71 TK</span></div>
            <div class="package-item" onclick="selectPack(this, Weekly, 145)"><span class="package-name">Weekly</span><span class="package-price">145 TK</span></div>
            <div class="package-item" onclick="selectPack(this, Monthly, 745)"><span class="package-name">Monthly</span><span class="package-price">745 TK</span></div>
        </div>
        <form action="/order" method="POST">
            <input type="hidden" name="package" id="p_input" required>
            <input type="text" name="player_id" placeholder="UID" required>
            <select name="payment_method"><option value="bkash">bkash</option><option value="Nagad">Nagad</option></select>
            <input type="text" name="trx_id" placeholder="TrxID" required>
            <button type="submit" class="btn-order">Complete Order</button>
        </form>
    </div>
    <script>
        function selectPack(e, n, p) {
            document.querySelectorAll(".package-item").forEach(i => i.classList.remove("selected"));
            e.classList.add("selected");
            document.getElementById("p_input").value = n + " - " + p + " TK";
        }
    </script>
</body>
</html>
